name: ridesync
description: Verified professional ride sharing — Lahore, Pakistan
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.1

  # Secure storage (JWT token)
  flutter_secure_storage: ^9.0.0

  # Preferences
  shared_preferences: ^2.2.2

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0

  # Real-time
  socket_io_client: ^2.0.3+1

  # Firebase (push notifications)
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9

  # UI
  cached_network_image: ^3.3.1
  pinput: ^3.0.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9

  # Utils
  intl: ^0.19.0

  # Maps (OpenStreetMap - free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
